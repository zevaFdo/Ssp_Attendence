# Attendance Web — 継続的インテグレーション
# Attendance Web — Continuous Integration
#
# 必須: lint → Vitest（単体）→ build → Playwright（ログイン smoke）
# Optional: set repository variable CI_INTEGRATION_ENABLED=true and Supabase secrets
#           to run real-DB integration tests (see job integration).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ビルド・E2E 用プレースホルダー（本番シークレット不要・JWT 形式は使わない）
env:
  NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.invalid
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-not-a-real-anon-key
  SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-not-a-real-service-key
  APP_URL: http://localhost:3000

jobs:
  quality:
    name: Lint, test & build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit & integration tests (Vitest)
        run: npm run test

      - name: Production build
        run: npm run build

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (desktop + mobile viewport)
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  integration:
    name: Supabase integration (optional)
    runs-on: ubuntu-latest
    needs: quality
    if: vars.CI_INTEGRATION_ENABLED == 'true'
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Integration tests (real Supabase)
        run: npm run test:integration
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
